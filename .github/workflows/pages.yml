name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage app for Pages
        run: |
          mkdir -p _site
          cp -r app/* _site/
          # 한글 파일명은 GitHub Pages URL 인코딩이 까다로움 — 영문 alias 함께 제공
          cp "_site/디벨로켓 수강생 관리.html" "_site/index.html"
          echo "Files staged:"
          ls -la _site

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
